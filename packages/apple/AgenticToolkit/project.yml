name: AgenticToolkit
options:
  bundleIdPrefix: com.mikefullerton.agentictoolkit
  developmentLanguage: en
  deploymentTarget:
    macOS: "26.0"
  groupSortPosition: top
  generateEmptyDirectories: false
  xcodeVersion: "2640"

settings:
  base:
    SWIFT_VERSION: "6.3"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    SDKROOT: macosx
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEAD_CODE_STRIPPING: YES
    ENABLE_TESTABILITY: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    ENABLE_MODULE_VERIFIER: YES
    GENERATE_INFOPLIST_FILE: YES
    MODULE_VERIFIER_SUPPORTED_LANGUAGE_STANDARDS: "gnu11 gnu++14"
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    SWIFT_ENABLE_EXPLICIT_MODULES: NO
    LM_FILTER_WARNINGS: YES
    OTHER_LDFLAGS: "$(inherited) -weak_framework AppIntents"
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGN_IDENTITY: ""
    PRODUCT_NAME: $(TARGET_NAME)

targetTemplates:
  SwiftLint:
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          if [[ "$(uname -m)" == "arm64" ]]; then
            export PATH="/opt/homebrew/bin:$PATH"
          fi
          if which swiftlint >/dev/null; then
            swiftlint lint --quiet --strict
          else
            echo "warning: SwiftLint not installed; brew install swiftlint to enable"
          fi

packages:
  CodeEditLanguages:
    url: https://github.com/CodeEditApp/CodeEditLanguages.git
    exactVersion: "0.1.20"
  CodeEditSourceEditor:
    url: https://github.com/CodeEditApp/CodeEditSourceEditor.git
    minVersion: "0.15.2"
    maxVersion: "1.0.0"
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    minVersion: "1.2.0"
    maxVersion: "2.0.0"
  ModelContextProtocol:
    url: https://github.com/modelcontextprotocol/swift-sdk
    minVersion: "0.11.0"
    maxVersion: "1.0.0"

targets:
  AIPluginKit:
    type: framework
    platform: macOS
    templates:
      - SwiftLint
    sources:
      - AIPluginKit

  AgenticToolkitCore:
    type: framework
    platform: macOS
    templates:
      - SwiftLint
    sources:
      - path: Core
      - path: macOS/Features/AIChatWindow/ChatBackend.swift
        group: Core
    dependencies:
      - package: ModelContextProtocol
        product: MCP

  AgenticToolkitCoreUI:
    type: framework
    platform: macOS
    templates:
      - SwiftLint
    sources:
      - CoreUI
    dependencies:
      - target: AgenticToolkitCore

  AgenticToolkitCoreMacOS:
    type: framework
    platform: macOS
    templates:
      - SwiftLint
    sources:
      - path: CoreMacOS
      - path: macOS/UI/Settings/SettingStorage/RGBAColor+NSColor.swift
        group: CoreMacOS
    dependencies:
      - target: AgenticToolkitCore
      - target: AgenticToolkitCoreUI

  AgenticToolkitMacOS:
    type: framework
    platform: macOS
    templates:
      - SwiftLint
    sources:
      - path: macOS
        excludes:
          - "Features/AIChatWindow/ChatBackend.swift"
          - "Features/SessionWatcher/Old/OldSessionWindowPanelViewController.swift"
          - "Features/SessionWatcher/Old/OldSessionWindowSettingsPane.swift"
          - "Features/TerminalSession/Settings/OldNotificationsPanelViewController.swift"
          - "Features/TerminalSession/Settings/OldNotificationsSettingsPane.swift"
          - "Features/TerminalSession/Settings/OldTerminalGeneralPanelViewController.swift"
          - "Features/TerminalSession/Settings/OldTerminalProfilesPanelViewController.swift"
          - "Features/TerminalSession/Settings/TerminalProfilesSettingsPanelViewController.swift"
          - "Features/TerminalSession/Settings/TerminalSessionGeneralSettingsView.swift"
          - "Features/TerminalSession/Settings/TerminalSessionProfilesSettingsView.swift"
          - "Features/TerminalSession/Settings/TerminalSettingsPanelViewController.swift"
          - "SystemIntegration/Appearance/OldAppearanceSettingsPane.swift"
          - "SystemIntegration/Appearance/OldAppearanceSettingsPanelViewController.swift"
          - "SystemIntegration/PermissionWalkthrough/OldSystemSettingsPane.swift"
          - "UI/Settings/SettingStorage/RGBAColor+NSColor.swift"
    dependencies:
      - target: AgenticToolkitCore
      - target: AgenticToolkitCoreUI
      - target: AgenticToolkitCoreMacOS
      - target: AIPluginKit
      - package: SwiftTerm
      - package: CodeEditSourceEditor
      - package: CodeEditLanguages

  AgenticToolkitCoreTests:
    type: bundle.unit-test
    platform: macOS
    templates:
      - SwiftLint
    sources:
      - Tests/AgenticToolkitCoreTests
    dependencies:
      - target: AgenticToolkitCore
        embed: true
        codeSign: true

  AgenticToolkitCoreUITests:
    type: bundle.unit-test
    platform: macOS
    templates:
      - SwiftLint
    sources:
      - Tests/AgenticToolkitCoreUITests
    dependencies:
      - target: AgenticToolkitCoreUI
        embed: true
        codeSign: true
      - target: AgenticToolkitCore
        embed: true
        codeSign: true

  AgenticToolkitCoreMacOSTests:
    type: bundle.unit-test
    platform: macOS
    templates:
      - SwiftLint
    sources:
      - Tests/AgenticToolkitCoreMacOSTests
    dependencies:
      - target: AgenticToolkitCoreMacOS
        embed: true
        codeSign: true
      - target: AgenticToolkitCore
        embed: true
        codeSign: true

  AIPluginKitTests:
    type: bundle.unit-test
    platform: macOS
    templates:
      - SwiftLint
    sources:
      - Tests/AIPluginKitTests
    dependencies:
      - target: AIPluginKit
        embed: true
        codeSign: true

  AgenticToolkitMacOSTests:
    type: bundle.unit-test
    platform: macOS
    templates:
      - SwiftLint
    sources:
      - Tests/AgenticToolkitMacOSTests
    dependencies:
      - target: AgenticToolkitMacOS
        embed: true
        codeSign: true
      - target: AgenticToolkitCoreMacOS
        embed: true
        codeSign: true
      - target: AgenticToolkitCoreUI
        embed: true
        codeSign: true
      - target: AgenticToolkitCore
        embed: true
        codeSign: true

aggregateTargets:
  AgenticToolkitMacOSAll:
    targets:
      - AIPluginKit
      - AgenticToolkitCore
      - AgenticToolkitCoreUI
      - AgenticToolkitCoreMacOS
      - AgenticToolkitMacOS

  AgenticToolkitMacOSTestsAll:
    targets:
      - AIPluginKit
      - AgenticToolkitCore
      - AgenticToolkitCoreMacOS
      - AgenticToolkitCoreUI
      - AgenticToolkitMacOS
      - AIPluginKitTests
      - AgenticToolkitCoreMacOSTests
      - AgenticToolkitCoreTests
      - AgenticToolkitCoreUITests
      - AgenticToolkitMacOSTests

schemes:
  AIPluginKit:
    build:
      targets:
        AIPluginKit: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AIPluginKitTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  AgenticToolkitMacOS:
    build:
      targets:
        AgenticToolkitMacOS: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AIPluginKitTests
        - AgenticToolkitMacOSTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
