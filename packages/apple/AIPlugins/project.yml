aggregateTargets:
  AIPluginsMacOSAll:
    targets:
      - ClaudeAPI
      - ClaudeLocal
      - Google
      - OpenAI
      - OpenAICompatible

schemes:
  AIPlugins:
    build:
      targets:
        ClaudeAPI: all
        ClaudeLocal: all
        Google: all
        OpenAI: all
        OpenAICompatible: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  AIPluginsMacOSAll:
    build:
      targets:
        AIPluginsMacOSAll: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
