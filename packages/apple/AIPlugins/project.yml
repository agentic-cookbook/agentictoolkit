name: AIPlugins
options:
  bundleIdPrefix: com.agentictoolkit
  developmentLanguage: en
  deploymentTarget:
    macOS: "26.0"
  groupSortPosition: top
  generateEmptyDirectories: false
  xcodeVersion: "2640"

settings:
  base:
    SWIFT_VERSION: "6.3"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    SDKROOT: macosx
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEAD_CODE_STRIPPING: YES
    ENABLE_MODULE_VERIFIER: YES
    ENABLE_TESTABILITY: YES
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    MODULE_VERIFIER_SUPPORTED_LANGUAGE_STANDARDS: "gnu11 gnu++14"
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    SWIFT_ENABLE_EXPLICIT_MODULES: NO
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGN_IDENTITY: ""
    PRODUCT_NAME: $(TARGET_NAME)

projectReferences:
  AgenticToolkit:
    path: ../AgenticToolkit/AgenticToolkit.xcodeproj

targetTemplates:
  SwiftLint:
    preBuildScripts:
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        script: |
          if [[ "$(uname -m)" == "arm64" ]]; then
            export PATH="/opt/homebrew/bin:$PATH"
          fi
          if which swiftlint >/dev/null; then
            swiftlint lint --quiet --strict
          else
            echo "warning: SwiftLint not installed; brew install swiftlint to enable"
          fi

targets:
  AIPluginsShared:
    type: framework
    platform: macOS
    templates:
      - SwiftLint
    sources:
      - AIPluginsShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.AIPluginsShared
        PRODUCT_NAME: $(TARGET_NAME:c99extidentifier)
        DEVELOPMENT_TEAM: K2NA732JAX
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ENABLE_MODULE_VERIFIER: YES
        GENERATE_INFOPLIST_FILE: YES
        BUILD_LIBRARY_FOR_DISTRIBUTION: NO
        SKIP_INSTALL: YES
        DYLIB_COMPATIBILITY_VERSION: "1"
        DYLIB_CURRENT_VERSION: "1"
        DYLIB_INSTALL_NAME_BASE: "@rpath"
        INSTALL_PATH: $(LOCAL_LIBRARY_DIR)/Frameworks
        VERSIONING_SYSTEM: apple-generic
        SWIFT_INSTALL_MODULE: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        DEFINES_MODULE: NO
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
          - "@loader_path/Frameworks"
    dependencies:
      - target: AgenticToolkit/AgenticToolkitCore
        embed: false
      - target: AgenticToolkit/AgenticToolkitCoreUI
        embed: false
      - target: AgenticToolkit/AgenticToolkitCoreMacOS
        embed: false
      - target: AgenticToolkit/AgenticToolkitMacOS
        embed: false

  AIPluginsSharedTests:
    type: bundle.unit-test
    platform: macOS
    templates:
      - SwiftLint
    sources:
      - AIPluginsSharedTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.AIPluginsSharedTests
        DEVELOPMENT_TEAM: K2NA732JAX
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: AIPluginsShared
        embed: false

  AIPluginKit:
    type: framework
    platform: macOS
    templates:
      - SwiftLint
    sources:
      - AIPluginKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.AIPluginKit
        PRODUCT_NAME: $(TARGET_NAME:c99extidentifier)
        DEVELOPMENT_TEAM: K2NA732JAX
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ENABLE_MODULE_VERIFIER: YES
        GENERATE_INFOPLIST_FILE: YES
        BUILD_LIBRARY_FOR_DISTRIBUTION: NO
        SKIP_INSTALL: YES
        DYLIB_COMPATIBILITY_VERSION: "1"
        DYLIB_CURRENT_VERSION: "1"
        DYLIB_INSTALL_NAME_BASE: "@rpath"
        INSTALL_PATH: $(LOCAL_LIBRARY_DIR)/Frameworks
        VERSIONING_SYSTEM: apple-generic
        SWIFT_INSTALL_MODULE: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        DEFINES_MODULE: NO
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@executable_path/../Frameworks"
          - "@loader_path/Frameworks"

  AIPluginKitTests:
    type: bundle.unit-test
    platform: macOS
    templates:
      - SwiftLint
    sources:
      - AIPluginKitTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.AIPluginKitTests
        DEVELOPMENT_TEAM: K2NA732JAX
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: AIPluginKit
        embed: false

  ClaudeAPI:
    type: bundle
    platform: macOS
    templates:
      - SwiftLint
    sources:
      - path: ClaudeAPI
        excludes:
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.plugin.claude-api
        WRAPPER_EXTENSION: aiplugin
        INFOPLIST_FILE: ClaudeAPI/Info.plist
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - "@loader_path/../../../../Frameworks"
    dependencies:
      - target: AIPluginsShared
        embed: false
      - target: AgenticToolkit/AgenticToolkitCore
        embed: false
      - target: AgenticToolkit/AgenticToolkitCoreUI
        embed: false
      - target: AgenticToolkit/AgenticToolkitCoreMacOS
        embed: false
      - target: AgenticToolkit/AgenticToolkitMacOS
        embed: false
    postBuildScripts:
      - name: Install to ~/.agenticplugins
        basedOnDependencyAnalysis: false
        script: |
          mkdir -p "$HOME/.agenticplugins"
          /usr/bin/rsync -a --delete "$BUILT_PRODUCTS_DIR/$FULL_PRODUCT_NAME/" "$HOME/.agenticplugins/$FULL_PRODUCT_NAME/"

  ClaudeLocal:
    type: bundle
    platform: macOS
    templates:
      - SwiftLint
