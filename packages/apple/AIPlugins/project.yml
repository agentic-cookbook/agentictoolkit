    postBuildScripts:
      - name: Install to ~/.agenticplugins
        basedOnDependencyAnalysis: false
        script: |
          mkdir -p "$HOME/.agenticplugins"
          /usr/bin/rsync -a --delete "$BUILT_PRODUCTS_DIR/$FULL_PRODUCT_NAME/" "$HOME/.agenticplugins/$FULL_PRODUCT_NAME/"

aggregateTargets:
  AIPluginsMacOSAll:
    targets:
      - ClaudeAPI
      - ClaudeLocal
      - Google
      - OpenAI
      - OpenAICompatible

schemes:
  AIPlugins:
    build:
      targets:
        ClaudeAPI: all
        ClaudeLocal: all
        Google: all
        OpenAI: all
        OpenAICompatible: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AIPluginsSharedTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  AIPluginsMacOSAll:
    build:
      targets:
        AIPluginsMacOSAll: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

  AIPluginKit:
    build:
      targets:
        AIPluginKit: all
    test:
      config: Debug
      targets:
        - AIPluginKitTests
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
