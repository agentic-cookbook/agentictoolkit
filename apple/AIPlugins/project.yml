name: Plugins
options:
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.3"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

targetTemplates:
  Plugin:
    type: bundle
    platform: macOS
    dependencies:
      # Link-without-embed against the host's dynamic umbrella. Resolved at
      # runtime via the host's @rpath when the plugin bundle is loaded.
      # See docs/research/spm-dynamic-linking.md for the full rationale.
      - package: AgenticToolkit
        product: AgenticToolkitPluginHost
        embed: false
        link: true
    settings:
      base:
        # Host app has the framework at Contents/Frameworks; a plugin at
        # Contents/MacOS/<name> resolves it via four `..` hops to
        # PluginName.bundle/Contents/MacOS → Contents/Resources/../..
        # → AgenticToolkitApp.app/Contents/Frameworks.
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@loader_path/../../../../Frameworks"
    postBuildScripts:
      - name: Install to ~/.agenticplugins
        script: |
          mkdir -p "$HOME/.agenticplugins"
          /usr/bin/rsync -a --delete "$BUILT_PRODUCTS_DIR/$FULL_PRODUCT_NAME/" "$HOME/.agenticplugins/$FULL_PRODUCT_NAME/"
        outputPaths:
          - $(HOME)/.agenticplugins/$(FULL_PRODUCT_NAME)

packages:
  AgenticToolkit:
    path: ../AgenticToolkit

targets:

  ClaudeAPIPlugin:
    templates: [Plugin]
    sources:
      - path: ClaudeAPIPlugin
    settings:
      base:
        INFOPLIST_FILE: ClaudeAPIPlugin/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.plugin.claude-api

  ClaudeLocalPlugin:
    templates: [Plugin]
    sources:
      - path: ClaudeLocalPlugin
    settings:
      base:
        INFOPLIST_FILE: ClaudeLocalPlugin/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.plugin.claude-local

  OpenAIPlugin:
    templates: [Plugin]
    sources:
      - path: OpenAIPlugin
    settings:
      base:
        INFOPLIST_FILE: OpenAIPlugin/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.plugin.openai

  GooglePlugin:
    templates: [Plugin]
    sources:
      - path: GooglePlugin
    settings:
      base:
        INFOPLIST_FILE: GooglePlugin/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.plugin.google

  OpenAICompatiblePlugin:
    templates: [Plugin]
    sources:
      - path: OpenAICompatiblePlugin
    settings:
      base:
        INFOPLIST_FILE: OpenAICompatiblePlugin/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.plugin.openai-compatible

schemes:
  Plugins:
    build:
      targets:
        ClaudeAPIPlugin: all
        ClaudeLocalPlugin: all
        OpenAIPlugin: all
        GooglePlugin: all
        OpenAICompatiblePlugin: all
  AllPlugins:
    build:
      targets:
        AllPlugins: all

# Client-facing aggregate target. Clients depend on `Plugins/AllPlugins` and
# never enumerate individual plugins. When a new plugin target is added to
# `targets:` above, also add it here — the only place that enumerates the
# full plugin list for client builds.
aggregateTargets:
  AllPlugins:
    targets:
      - ClaudeAPIPlugin
      - ClaudeLocalPlugin
      - OpenAIPlugin
      - GooglePlugin
      - OpenAICompatiblePlugin
