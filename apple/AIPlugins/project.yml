name: AIPlugins
options:
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.3"
    # See AgenticToolkitApp/project.yml for rationale — Xcode 26
    # explicit-module scanner regression (FB20602885).
    SWIFT_ENABLE_EXPLICIT_MODULES: NO
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

targetTemplates:
  Plugin:
    type: bundle
    platform: macOS
    dependencies:
      # Link-without-embed against the host's dynamic umbrella. Resolved at
      # runtime via the host's @rpath when the plugin bundle is loaded.
      # See docs/research/spm-dynamic-linking.md for the full rationale.
      - package: AgenticToolkit
        product: AgenticToolkitPluginHost
        embed: false
        link: true
    settings:
      base:
        # Custom bundle extension so plugins are visually distinct from
        # generic .bundle packages in ~/.agenticplugins/. AIPluginManager
        # discovers files by this extension.
        WRAPPER_EXTENSION: aiplugin
        # Host app has the framework at Contents/Frameworks; a plugin at
        # Contents/MacOS/<name> resolves it via four `..` hops to
        # PluginName.aiplugin/Contents/MacOS → Contents/Resources/../..
        # → AgenticToolkitApp.app/Contents/Frameworks.
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@loader_path/../../../../Frameworks"
    postBuildScripts:
      - name: Install to ~/.agenticplugins
        script: |
          mkdir -p "$HOME/.agenticplugins"
          /usr/bin/rsync -a --delete "$BUILT_PRODUCTS_DIR/$FULL_PRODUCT_NAME/" "$HOME/.agenticplugins/$FULL_PRODUCT_NAME/"
        # rsync --delete is idempotent — we want this to run every build so
        # iterating on plugin code picks up on the host side. Declaring
        # outputs around a directory is unreliable in Xcode's dep analysis,
        # so opt out of dep analysis explicitly.
        basedOnDependencyAnalysis: false

packages:
  AgenticToolkit:
    path: ../AgenticToolkit

targets:

  ClaudeAPI:
    templates: [Plugin]
    sources:
      - path: ClaudeAPI
    settings:
      base:
        INFOPLIST_FILE: ClaudeAPI/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.plugin.claude-api

  ClaudeLocal:
    templates: [Plugin]
    sources:
      - path: ClaudeLocal
    settings:
      base:
        INFOPLIST_FILE: ClaudeLocal/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.plugin.claude-local

  OpenAI:
    templates: [Plugin]
    sources:
      - path: OpenAI
    settings:
      base:
        INFOPLIST_FILE: OpenAI/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.plugin.openai

  Google:
    templates: [Plugin]
    sources:
      - path: Google
    settings:
      base:
        INFOPLIST_FILE: Google/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.plugin.google

  OpenAICompatible:
    templates: [Plugin]
    sources:
      - path: OpenAICompatible
    settings:
      base:
        INFOPLIST_FILE: OpenAICompatible/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.plugin.openai-compatible

schemes:
  AIPlugins:
    build:
      targets:
        ClaudeAPI: all
        ClaudeLocal: all
        OpenAI: all
        Google: all
        OpenAICompatible: all
  AllPlugins:
    build:
      targets:
        AllPlugins: all

# Client-facing aggregate target. Clients depend on `AIPlugins/AllPlugins` and
# never enumerate individual plugins. When a new plugin target is added to
# `targets:` above, also add it here — the only place that enumerates the
# full plugin list for client builds.
aggregateTargets:
  AllPlugins:
    targets:
      - ClaudeAPI
      - ClaudeLocal
      - OpenAI
      - Google
      - OpenAICompatible
