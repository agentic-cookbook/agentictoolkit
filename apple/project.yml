name: AgenticToolkit
options:
  deploymentTarget:
    macOS: "14.0"
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    BUILD_LIBRARY_FOR_DISTRIBUTION: YES
    DEFINES_MODULE: YES
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

targets:

  # Cross-platform — Foundation only (macOS build for this stack)
  AgenticToolkit:
    type: framework
    platform: macOS
    sources:
      - path: Sources/AgenticToolkit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.AgenticToolkit

  AgenticToolkitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/AgenticToolkitTests
    dependencies:
      - target: AgenticToolkit

  # macOS — AppKit
  AgenticAppKit:
    type: framework
    platform: macOS
    sources:
      - path: Sources/AgenticAppKit
    dependencies:
      - target: AgenticToolkit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.AgenticAppKit

  AgenticAppKitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/AgenticAppKitTests
    dependencies:
      - target: AgenticAppKit
      - target: AgenticToolkit

  # iOS/tvOS UIKit — built as macOS-only here (UIKit imports are #if canImport-guarded).
  # iOS/tvOS product support deferred until the stack needs it.
  AgenticUIKit:
    type: framework
    platform: macOS
    sources:
      - path: Sources/AgenticUIKit
    dependencies:
      - target: AgenticToolkit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.AgenticUIKit

  AgenticUIKitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/AgenticUIKitTests
    dependencies:
      - target: AgenticUIKit
      - target: AgenticToolkit

schemes:
  AgenticToolkit:
    build:
      targets:
        AgenticToolkit: all
    test:
      targets:
        - AgenticToolkitTests

  AgenticAppKit:
    build:
      targets:
        AgenticAppKit: all
    test:
      targets:
        - AgenticAppKitTests

  AgenticUIKit:
    build:
      targets:
        AgenticUIKit: all
    test:
      targets:
        - AgenticUIKitTests
