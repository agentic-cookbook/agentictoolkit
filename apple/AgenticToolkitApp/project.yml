name: AgenticToolkitApp
options:
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.3"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: K2NA732JAX
    LD_RUNPATH_SEARCH_PATHS:
      - "$(inherited)"
      - "@executable_path/../Frameworks"

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"
  AgenticToolkit:
    path: ../AgenticToolkit

targets:

  AgenticToolkitApp:
    type: application
    platform: macOS
    sources:
      - path: AgenticToolkitApp
        excludes:
          - "Info.plist"
          - "AgenticToolkitApp.entitlements"
          # Parked pending per-plugin secret storage design.
          - "Settings/DatabaseManagerPersistence.swift"
    resources:
      - path: AgenticToolkitApp/Assets.xcassets
    dependencies:
      - package: AgenticToolkit
        product: AgenticToolkitCore
        embed: true
      - package: AgenticToolkit
        product: AgenticToolkitScripting
        embed: true
      - package: AgenticToolkit
        product: AgenticToolkitCoreUI
        embed: true
      - package: AgenticToolkit
        product: AgenticToolkitAIProvider
        embed: true
      - package: AgenticToolkit
        product: AgenticToolkitLoggingWindow
        embed: true
      - package: AgenticToolkit
        product: AgenticToolkitChatWindow
        embed: true
      - package: AgenticToolkit
        product: AgenticToolkitNotesWindow
        embed: true
      - package: AgenticToolkit
        product: AgenticToolkitSettingsWindow
        embed: true
      - package: AgenticToolkit
        product: AgenticToolkitTerminalWindow
        embed: true
      - package: AgenticToolkit
        product: AgenticToolkitFileBrowser
        embed: true
      - package: AgenticToolkit
        product: AgenticToolkitAIPlugins
        embed: true
      - package: SwiftTerm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentic-toolkit.app
        INFOPLIST_FILE: AgenticToolkitApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: AgenticToolkitApp/AgenticToolkitApp.entitlements
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"

  AgenticToolkitAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AgenticToolkitAppTests
        excludes:
          # Parked with the chat wiring.
          - "MiniChatViewModelTests.swift"
          # Parked — references removed symbol `SessionRowAppKitView`.
          - "SessionRowViewTests.swift"
          # Parked — references removed SettingsViewModel members
          # (clickAction, customCommand, defaultClickAction, defaultCustomCommand).
          - "SettingsViewModelTests.swift"
          # Parked — pre-Swift-6 sendability of XCTestCase `self` in
          # DispatchQueue.global() async closures. Needs rewrite with
          # actor-aware helpers.
          - "IngestionIntegrationTests.swift"
    dependencies:
      - target: AgenticToolkitApp
      - package: AgenticToolkit
        product: AgenticToolkitCoreUI
      - package: AgenticToolkit
        product: AgenticToolkitAIPlugins
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentic-toolkit.app.tests
        GENERATE_INFOPLIST_FILE: YES
        # Test files predate Swift 6 strict concurrency — relax on the test
        # target so the tests build without touching every test method.
        SWIFT_STRICT_CONCURRENCY: minimal

schemes:
  AgenticToolkitApp:
    build:
      targets:
        AgenticToolkitApp: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AgenticToolkitAppTests
