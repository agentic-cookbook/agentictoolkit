name: AgenticToolkitApp
options:
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.3"
    # Xcode 26 defaults SWIFT_ENABLE_EXPLICIT_MODULES=YES. Its scanner fails
    # to propagate transitive deps into the synthesized
    # *_PackageProduct.framework wrappers generated around third-party SPM
    # targets (e.g. TextFormation → Rearrange). Opt out. See
    # docs/research/spm-dynamic-linking.md / FB20602885.
    SWIFT_ENABLE_EXPLICIT_MODULES: NO
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: K2NA732JAX
    LD_RUNPATH_SEARCH_PATHS:
      - "$(inherited)"
      - "@executable_path/../Frameworks"

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"
  CodeEditSourceEditor:
    url: https://github.com/CodeEditApp/CodeEditSourceEditor.git
    from: "0.15.2"
  CodeEditLanguages:
    url: https://github.com/CodeEditApp/CodeEditLanguages.git
    exactVersion: "0.1.20"

projectReferences:
  AgenticToolkit:
    path: ../AgenticToolkit/AgenticToolkit.xcodeproj
  AIPlugins:
    path: ../AIPlugins/AIPlugins.xcodeproj

targets:

  AgenticToolkitApp:
    type: application
    platform: macOS
    sources:
      - path: AgenticToolkitApp
        excludes:
          - "Info.plist"
          - "AgenticToolkitApp.entitlements"
          # Parked pending per-plugin secret storage design.
          - "Settings/DatabaseManagerPersistence.swift"
    dependencies:
      # Plugin boundary — 6 frameworks embedded so plugin bundles
      # (loaded via NSBundle) resolve them through the host's @rpath.
      - target: AgenticToolkit/AgenticToolkitCore
        embed: true
        link: true
      - target: AgenticToolkit/AgenticToolkitScripting
        embed: true
        link: true
      - target: AgenticToolkit/AgenticToolkitCoreUI
        embed: true
        link: true
      - target: AgenticToolkit/AgenticToolkitSettingsWindow
        embed: true
        link: true
      - target: AgenticToolkit/AgenticToolkitChatWindow
        embed: true
        link: true
      - target: AgenticToolkit/AgenticToolkitAIPlugins
        embed: true
        link: true
      # Non-boundary modules used directly by the app.
      - target: AgenticToolkit/AgenticToolkitLoggingWindow
        embed: true
        link: true
      - target: AgenticToolkit/AgenticToolkitNotesWindow
        embed: true
        link: true
      - target: AgenticToolkit/AgenticToolkitTerminalWindow
        embed: true
        link: true
      - target: AgenticToolkit/AgenticToolkitFileBrowser
        embed: true
        link: true
      - target: AgenticToolkit/AgenticToolkitDocument
        embed: true
        link: true
      # Plugin bundles — build-order only. Triggers AllPlugins aggregate,
      # which builds all 5 plugins and runs their postBuildScript
      # (installs to ~/.agenticplugins/).
      - target: AIPlugins/AllPlugins
        embed: false
        link: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentic-toolkit.app
        INFOPLIST_FILE: AgenticToolkitApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: AgenticToolkitApp/AgenticToolkitApp.entitlements
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"

  AgenticToolkitAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AgenticToolkitAppTests
        excludes:
          # Parked with the chat wiring.
          - "MiniChatViewModelTests.swift"
          # Parked — references removed symbol `SessionRowAppKitView`.
          - "SessionRowViewTests.swift"
          # Parked — references removed SettingsViewModel members
          # (clickAction, customCommand, defaultClickAction, defaultCustomCommand).
          - "SettingsViewModelTests.swift"
          # Parked — pre-Swift-6 sendability of XCTestCase `self` in
          # DispatchQueue.global() async closures. Needs rewrite with
          # actor-aware helpers.
          - "IngestionIntegrationTests.swift"
    dependencies:
      - target: AgenticToolkitApp
      - target: AgenticToolkit/AgenticToolkitCoreUI
      - target: AgenticToolkit/AgenticToolkitAIPlugins
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentic-toolkit.app.tests
        GENERATE_INFOPLIST_FILE: YES
        # Test files predate Swift 6 strict concurrency — relax on the test
        # target so the tests build without touching every test method.
        SWIFT_STRICT_CONCURRENCY: minimal

schemes:
  AgenticToolkitApp:
    build:
      targets:
        AgenticToolkitApp: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AgenticToolkitAppTests
