name: AgenticToolkitApp
options:
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    # Swift 5 language mode: AgenticToolkitApp predates the migration and has existing
    # Sendable/isolation patterns we don't want to rewrite right now.
    SWIFT_VERSION: "5.0"
    SWIFT_STRICT_CONCURRENCY: minimal
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: K2NA732JAX
    LD_RUNPATH_SEARCH_PATHS:
      - "$(inherited)"
      - "@executable_path/../Frameworks"
      - "$(HOME)/.agenticplugins"

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"

projectReferences:
  AgenticToolkit:
    path: ../AgenticToolkit/AgenticToolkit.xcodeproj
  Plugins:
    path: ../Plugins/Plugins.xcodeproj
    # App target depends on the Plugins/AllPlugins aggregate, which fans out
    # to every built-in plugin. Deployment happens automatically via each
    # plugin's CONFIGURATION_BUILD_DIR = $HOME/.agenticplugins. Clients
    # never enumerate individual plugins here.

targets:

  AgenticToolkitApp:
    type: application
    platform: macOS
    sources:
      - path: AgenticToolkitApp
        excludes:
          - "Info.plist"
          - "AgenticToolkitApp.entitlements"
          # Parked pending per-plugin secret storage design.
          - "Settings/DatabaseManagerPersistence.swift"
    resources:
      - path: AgenticToolkitApp/Assets.xcassets
    dependencies:
      # AgenticPluginSDK dynamically links Core/CoreUI/SettingsWindow/ChatWindow,
      # so all four must also be embedded for dyld to resolve them at launch.
      - target: AgenticToolkit/AgenticPluginSDK
        embed: true
      - target: AgenticToolkit/Core
        embed: true
      - target: AgenticToolkit/CoreUI
        embed: true
      - target: AgenticToolkit/Scripting
        embed: true
      - target: AgenticToolkit/SettingsWindow
        embed: true
      - target: AgenticToolkit/ChatWindow
        embed: true
      - package: SwiftTerm
      # Single aggregate dep fans out to every built-in plugin bundle. Each
      # bundle deploys to ~/.agenticplugins/ via its own
      # CONFIGURATION_BUILD_DIR, so the install dir is always fresh before
      # the app launches.
      - target: Plugins/AllPlugins
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentic-toolkit.app
        INFOPLIST_FILE: AgenticToolkitApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: AgenticToolkitApp/AgenticToolkitApp.entitlements
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"

  AgenticToolkitAppTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AgenticToolkitAppTests
        excludes:
          # Parked with the chat wiring.
          - "MiniChatViewModelTests.swift"
    dependencies:
      - target: AgenticToolkitApp
      - framework: AgenticPluginSDK.framework
        implicit: true
        project: AgenticToolkit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentic-toolkit.app.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  AgenticToolkitApp:
    build:
      targets:
        AgenticToolkitApp: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AgenticToolkitAppTests
