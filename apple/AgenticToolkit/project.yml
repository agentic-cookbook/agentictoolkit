name: AgenticToolkit
options:
  deploymentTarget:
    macOS: "14.0"
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    BUILD_LIBRARY_FOR_DISTRIBUTION: YES
    DEFINES_MODULE: YES
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  CodeEditSourceEditor:
    url: https://github.com/CodeEditApp/CodeEditSourceEditor.git
    from: 0.15.2
  CodeEditLanguages:
    url: https://github.com/CodeEditApp/CodeEditLanguages.git
    exactVersion: 0.1.20
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"

targets:

  # Cross-platform — Foundation only (macOS build for this stack)
  AgenticToolkit:
    type: framework
    platform: macOS
    sources:
      - path: AgenticToolkit
        excludes:
          - "**/Tests/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.AgenticToolkit

  AgenticToolkitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AgenticToolkit
        includes:
          - "**/Tests/**"
    dependencies:
      - target: AgenticToolkit

  # macOS — AppKit
  AgenticAppKit:
    type: framework
    platform: macOS
    sources:
      - path: AgenticAppKit
        excludes:
          - "**/Tests/**"
    dependencies:
      - target: AgenticToolkit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.AgenticAppKit

  AgenticAppKitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AgenticAppKit
        includes:
          - "**/Tests/**"
    dependencies:
      - target: AgenticAppKit
      - target: AgenticToolkit

  # Terminal emulator built on SwiftTerm. Split from AgenticAppKit so consumers
  # that only need AppKit don't inherit the SwiftTerm SPM package transitively.
  AgenticTerminalKit:
    type: framework
    platform: macOS
    sources:
      - path: AgenticTerminalKit
        excludes:
          - "**/Tests/**"
    dependencies:
      - target: AgenticToolkit
      - target: AgenticAppKit
      - package: SwiftTerm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.AgenticTerminalKit
        # SwiftTerm lacks library evolution support; disable it here so we
        # don't warn on every build about binary-compat not being guaranteed.
        BUILD_LIBRARY_FOR_DISTRIBUTION: NO

  AgenticTerminalKitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AgenticTerminalKit
        includes:
          - "**/Tests/**"
    dependencies:
      - target: AgenticTerminalKit
      - target: AgenticAppKit
      - target: AgenticToolkit

  # iOS/tvOS UIKit — built as macOS-only here (UIKit imports are #if canImport-guarded).
  # iOS/tvOS product support deferred until the stack needs it.
  AgenticUIKit:
    type: framework
    platform: macOS
    sources:
      - path: AgenticUIKit
        excludes:
          - "**/Tests/**"
    dependencies:
      - target: AgenticToolkit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.AgenticUIKit

  AgenticUIKitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AgenticUIKit
        includes:
          - "**/Tests/**"
    dependencies:
      - target: AgenticUIKit
      - target: AgenticToolkit

  # macOS — File browser subsystem extracted from Catnip IDE.
  AgenticFileBrowser:
    type: framework
    platform: macOS
    sources:
      - path: AgenticFileBrowser
        excludes:
          - "**/Tests/**"
    dependencies:
      - target: AgenticToolkit
      - package: CodeEditSourceEditor
        product: CodeEditSourceEditor
      - package: CodeEditLanguages
        product: CodeEditLanguages
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.AgenticFileBrowser

  AgenticFileBrowserTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AgenticFileBrowser
        includes:
          - "**/Tests/**"
    dependencies:
      - target: AgenticFileBrowser
      - target: AgenticToolkit

schemes:
  AgenticToolkit:
    build:
      targets:
        AgenticToolkit: all
    test:
      targets:
        - AgenticToolkitTests

  AgenticAppKit:
    build:
      targets:
        AgenticAppKit: all
    test:
      targets:
        - AgenticAppKitTests

  AgenticTerminalKit:
    build:
      targets:
        AgenticTerminalKit: all
    test:
      targets:
        - AgenticTerminalKitTests

  AgenticUIKit:
    build:
      targets:
        AgenticUIKit: all
    test:
      targets:
        - AgenticUIKitTests

  AgenticFileBrowser:
    build:
      targets:
        AgenticFileBrowser: all
    test:
      targets:
        - AgenticFileBrowserTests
