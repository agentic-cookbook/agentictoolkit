name: AgenticToolkit
options:
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.3"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    # See AgenticToolkitApp/project.yml for rationale — Xcode 26
    # explicit-module scanner regression (FB20602885).
    SWIFT_ENABLE_EXPLICIT_MODULES: NO
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"
  CodeEditSourceEditor:
    url: https://github.com/CodeEditApp/CodeEditSourceEditor.git
    from: "0.15.2"
  CodeEditLanguages:
    url: https://github.com/CodeEditApp/CodeEditLanguages.git
    exactVersion: "0.1.20"

targets:

  AgenticToolkitCore:
    type: framework
    platform: macOS
    sources: AgenticToolkitCore

  AgenticToolkitScripting:
    type: framework
    platform: macOS
    sources: AgenticToolkitScripting
    dependencies:
      - target: AgenticToolkitCore

  AgenticToolkitCoreUI:
    type: framework
    platform: macOS
    sources: UI/AgenticToolkitCoreUI
    dependencies:
      - target: AgenticToolkitCore
      - target: AgenticToolkitScripting

  AgenticToolkitChatWindow:
    type: framework
    platform: macOS
    sources: UI/Windows/AgenticToolkitChatWindow
    dependencies:
      - target: AgenticToolkitCore
      - target: AgenticToolkitCoreUI

  AgenticToolkitLoggingWindow:
    type: framework
    platform: macOS
    sources: UI/Windows/AgenticToolkitLoggingWindow
    dependencies:
      - target: AgenticToolkitCore
      - target: AgenticToolkitCoreUI

  AgenticToolkitNotesWindow:
    type: framework
    platform: macOS
    sources: UI/Windows/AgenticToolkitNotesWindow
    dependencies:
      - target: AgenticToolkitCore
      - target: AgenticToolkitCoreUI

  AgenticToolkitSettingsWindow:
    type: framework
    platform: macOS
    sources: UI/Windows/AgenticToolkitSettingsWindow
    dependencies:
      - target: AgenticToolkitCore
      - target: AgenticToolkitCoreUI

  AgenticToolkitTerminalWindow:
    type: framework
    platform: macOS
    sources: UI/Windows/AgenticToolkitTerminalWindow
    dependencies:
      - target: AgenticToolkitCore
      - target: AgenticToolkitCoreUI
      - target: AgenticToolkitAIPlugins
      - package: SwiftTerm
        product: SwiftTerm

  AgenticToolkitFileBrowser:
    type: framework
    platform: macOS
    sources: UI/AgenticToolkitFileBrowser
    dependencies:
      - target: AgenticToolkitCore
      - package: CodeEditSourceEditor
        product: CodeEditSourceEditor
      - package: CodeEditLanguages
        product: CodeEditLanguages

  AgenticToolkitAIPlugins:
    type: framework
    platform: macOS
    sources: AgenticToolkitAIPlugins
    dependencies:
      - target: AgenticToolkitCore
      - target: AgenticToolkitCoreUI
      - target: AgenticToolkitSettingsWindow
      - target: AgenticToolkitChatWindow

  AgenticToolkitDocument:
    type: framework
    platform: macOS
    sources: UI/AgenticToolkitDocument
    dependencies:
      - target: AgenticToolkitCore
      - target: AgenticToolkitFileBrowser
      - target: AgenticToolkitTerminalWindow

  # Test targets

  AgenticToolkitCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources: Tests/AgenticToolkitCoreTests
    dependencies:
      - target: AgenticToolkitCore

  AgenticToolkitScriptingTests:
    type: bundle.unit-test
    platform: macOS
    sources: Tests/AgenticToolkitScriptingTests
    dependencies:
      - target: AgenticToolkitScripting
      - target: AgenticToolkitCore

  AgenticToolkitCoreUITests:
    type: bundle.unit-test
    platform: macOS
    sources: Tests/AgenticToolkitCoreUITests
    dependencies:
      - target: AgenticToolkitCoreUI
      - target: AgenticToolkitScripting
      - target: AgenticToolkitCore

  AgenticToolkitLoggingWindowTests:
    type: bundle.unit-test
    platform: macOS
    sources: Tests/AgenticToolkitLoggingWindowTests
    dependencies:
      - target: AgenticToolkitLoggingWindow
      - target: AgenticToolkitCoreUI
      - target: AgenticToolkitCore

  AgenticToolkitTerminalWindowTests:
    type: bundle.unit-test
    platform: macOS
    sources: Tests/AgenticToolkitTerminalWindowTests
    dependencies:
      - target: AgenticToolkitTerminalWindow
      - target: AgenticToolkitAIPlugins
      - target: AgenticToolkitCoreUI
      - target: AgenticToolkitCore

  AgenticToolkitFileBrowserTests:
    type: bundle.unit-test
    platform: macOS
    sources: Tests/AgenticToolkitFileBrowserTests
    dependencies:
      - target: AgenticToolkitFileBrowser
      - target: AgenticToolkitCore

  AgenticToolkitAIPluginsTests:
    type: bundle.unit-test
    platform: macOS
    sources: Tests/AgenticToolkitAIPluginsTests
    dependencies:
      - target: AgenticToolkitAIPlugins

  AgenticToolkitDocumentTests:
    type: bundle.unit-test
    platform: macOS
    sources: Tests/AgenticToolkitDocumentTests
    dependencies:
      - target: AgenticToolkitDocument

# Client-facing umbrella target. The shared `Everything` scheme references
# this so a single build covers every framework in the package.
aggregateTargets:
  AgenticToolkitAll:
    targets:
      - AgenticToolkitCore
      - AgenticToolkitScripting
      - AgenticToolkitCoreUI
      - AgenticToolkitChatWindow
      - AgenticToolkitLoggingWindow
      - AgenticToolkitNotesWindow
      - AgenticToolkitSettingsWindow
      - AgenticToolkitTerminalWindow
      - AgenticToolkitFileBrowser
      - AgenticToolkitAIPlugins
      - AgenticToolkitDocument
