name: AgenticToolkit
options:
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.3"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    # See AgenticToolkitApp/project.yml for rationale — Xcode 26
    # explicit-module scanner regression (FB20602885).
    SWIFT_ENABLE_EXPLICIT_MODULES: NO
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"
  CodeEditSourceEditor:
    url: https://github.com/CodeEditApp/CodeEditSourceEditor.git
    from: "0.15.2"
  CodeEditLanguages:
    url: https://github.com/CodeEditApp/CodeEditLanguages.git
    exactVersion: "0.1.20"

targets:

  AgenticToolkitCore:
    type: framework
    platform: macOS
    sources: Core

  AgenticToolkitCoreUI:
    type: framework
    platform: macOS
    sources: CoreUI
    dependencies:
      - target: AgenticToolkitCore

  AgenticToolkitCoreMacOS:
    type: framework
    platform: macOS
    sources: CoreMacOS
    dependencies:
      - target: AgenticToolkitCore
      - target: AgenticToolkitCoreUI

  AgenticToolkitMacOS:
    type: framework
    platform: macOS
    sources: macOS
    dependencies:
      - target: AgenticToolkitCore
      - target: AgenticToolkitCoreUI
      - target: AgenticToolkitCoreMacOS
      - package: SwiftTerm
        product: SwiftTerm
      - package: CodeEditSourceEditor
        product: CodeEditSourceEditor
      - package: CodeEditLanguages
        product: CodeEditLanguages

  # Test targets

  AgenticToolkitCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources: Tests/AgenticToolkitCoreTests
    dependencies:
      - target: AgenticToolkitCore

  AgenticToolkitCoreUITests:
    type: bundle.unit-test
    platform: macOS
    sources: Tests/AgenticToolkitCoreUITests
    dependencies:
      - target: AgenticToolkitCoreUI
      - target: AgenticToolkitCore

  AgenticToolkitCoreMacOSTests:
    type: bundle.unit-test
    platform: macOS
    sources: Tests/AgenticToolkitCoreMacOSTests
    dependencies:
      - target: AgenticToolkitCoreMacOS
      - target: AgenticToolkitCore

  AgenticToolkitMacOSTests:
    type: bundle.unit-test
    platform: macOS
    sources: Tests/AgenticToolkitMacOSTests
    dependencies:
      - target: AgenticToolkitMacOS
      - target: AgenticToolkitCoreMacOS
      - target: AgenticToolkitCoreUI
      - target: AgenticToolkitCore

# Client-facing umbrella target. The shared `Everything` scheme references
# this so a single build covers every framework in the package.
aggregateTargets:
  AgenticToolkitAll:
    targets:
      - AgenticToolkitCore
      - AgenticToolkitCoreUI
      - AgenticToolkitCoreMacOS
      - AgenticToolkitMacOS
