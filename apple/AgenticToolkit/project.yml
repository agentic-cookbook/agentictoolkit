name: AgenticToolkit
options:
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  # Mirror the LastUpgradeCheck the user has on the real .xcodeproj so
  # `cc-xcgen` regens don't downgrade it.
  xcodeVersion: "2640"

settings:
  base:
    SWIFT_VERSION: "6.3"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES
    # See AgenticToolkitApp/project.yml for rationale — Xcode 26
    # explicit-module scanner regression (FB20602885).
    SWIFT_ENABLE_EXPLICIT_MODULES: NO
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    # Project-wide settings the user applied via the Xcode UI; tracked
    # here so `cc-xcgen` regens preserve them.
    DEAD_CODE_STRIPPING: YES
    ENABLE_MODULE_VERIFIER: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    MODULE_VERIFIER_SUPPORTED_LANGUAGE_STANDARDS: "gnu11 gnu++14"
    STRING_CATALOG_GENERATE_SYMBOLS: YES

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"
  CodeEditSourceEditor:
    url: https://github.com/CodeEditApp/CodeEditSourceEditor.git
    from: "0.15.2"
  CodeEditLanguages:
    url: https://github.com/CodeEditApp/CodeEditLanguages.git
    exactVersion: "0.1.20"

targets:

  AgenticToolkitCore:
    type: framework
    platform: macOS
    sources:
      - Core
      # Foundation-only `ChatBackend` types live next to the legacy macOS
      # chat window but are needed by `CoreMacOS/AIPlugins`. Hosting them
      # in Core (which CoreMacOS depends on) gives the plugin code visibility
      # without pulling in the full macOS UI target.
      - path: macOS/OldAIChatWindow/ChatBackend.swift

  AgenticToolkitCoreUI:
    type: framework
    platform: macOS
    sources: CoreUI
    dependencies:
      - target: AgenticToolkitCore

  AgenticToolkitCoreMacOS:
    type: framework
    platform: macOS
    sources: CoreMacOS
    dependencies:
      - target: AgenticToolkitCore
      - target: AgenticToolkitCoreUI

  AgenticToolkitMacOS:
    type: framework
    platform: macOS
    sources:
      - path: macOS
        # ChatBackend.swift is hosted in AgenticToolkitCore (see above) so
        # CoreMacOS plugins can reach it through the dependency chain.
        excludes:
          - "OldAIChatWindow/ChatBackend.swift"
    dependencies:
      - target: AgenticToolkitCore
      - target: AgenticToolkitCoreUI
      - target: AgenticToolkitCoreMacOS
      - package: SwiftTerm
        product: SwiftTerm
      - package: CodeEditSourceEditor
        product: CodeEditSourceEditor
      - package: CodeEditLanguages
        product: CodeEditLanguages

  # Test targets

  AgenticToolkitCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources: Tests/AgenticToolkitCoreTests
    dependencies:
      - target: AgenticToolkitCore

  AgenticToolkitCoreUITests:
    type: bundle.unit-test
    platform: macOS
    sources: Tests/AgenticToolkitCoreUITests
    dependencies:
      - target: AgenticToolkitCoreUI
      - target: AgenticToolkitCore

  AgenticToolkitCoreMacOSTests:
    type: bundle.unit-test
    platform: macOS
    sources: Tests/AgenticToolkitCoreMacOSTests
    dependencies:
      - target: AgenticToolkitCoreMacOS
      - target: AgenticToolkitCore

  AgenticToolkitMacOSTests:
    type: bundle.unit-test
    platform: macOS
    sources: Tests/AgenticToolkitMacOSTests
    dependencies:
      - target: AgenticToolkitMacOS
      - target: AgenticToolkitCoreMacOS
      - target: AgenticToolkitCoreUI
      - target: AgenticToolkitCore

# Client-facing umbrella target. The shared `Everything` scheme references
# this so a single build covers every framework in the package.
aggregateTargets:
  AgenticToolkitAll:
    targets:
      - AgenticToolkitCore
      - AgenticToolkitCoreUI
      - AgenticToolkitCoreMacOS
      - AgenticToolkitMacOS
