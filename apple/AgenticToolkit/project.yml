name: AgenticToolkit
options:
  deploymentTarget:
    macOS: "14.0"
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    BUILD_LIBRARY_FOR_DISTRIBUTION: YES
    DEFINES_MODULE: YES
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  CodeEditSourceEditor:
    url: https://github.com/CodeEditApp/CodeEditSourceEditor.git
    from: 0.15.2
  CodeEditLanguages:
    url: https://github.com/CodeEditApp/CodeEditLanguages.git
    exactVersion: 0.1.20
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"

targets:

  # --- Foundation-only utilities ---
  Core:
    type: framework
    platform: macOS
    sources:
      - path: Core
        excludes:
          - "**/Tests/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.Core

  CoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Core
        includes:
          - "**/Tests/**"
    dependencies:
      - target: Core

  # --- AppleScript and NSScriptCommand helpers ---
  Scripting:
    type: framework
    platform: macOS
    sources:
      - path: Scripting
        excludes:
          - "**/Tests/**"
    dependencies:
      - target: Core
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.Scripting

  ScriptingTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Scripting
        includes:
          - "**/Tests/**"
    dependencies:
      - target: Scripting
      - target: Core

  # --- Cross-cutting AppKit UI utilities (windowing, shared view types) ---
  CoreUI:
    type: framework
    platform: macOS
    sources:
      - path: CoreUI
        excludes:
          - "**/Tests/**"
    dependencies:
      - target: Core
      - target: Scripting
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.CoreUI

  CoreUITests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CoreUI
        includes:
          - "**/Tests/**"
    dependencies:
      - target: CoreUI
      - target: Scripting
      - target: Core

  # --- AI provider / request builder (Foundation-only) ---
  AIProvider:
    type: framework
    platform: macOS
    sources:
      - path: AIProvider
        excludes:
          - "**/Tests/**"
    dependencies:
      - target: Core
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.AIProvider

  AIProviderTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AIProvider
        includes:
          - "**/Tests/**"
    dependencies:
      - target: AIProvider
      - target: Core

  # --- Feature: logging window ---
  LoggingWindow:
    type: framework
    platform: macOS
    sources:
      - path: LoggingWindow
        excludes:
          - "**/Tests/**"
    dependencies:
      - target: Core
      - target: CoreUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.LoggingWindow

  LoggingWindowTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: LoggingWindow
        includes:
          - "**/Tests/**"
    dependencies:
      - target: LoggingWindow
      - target: CoreUI
      - target: Core

  # --- Feature: chat window ---
  ChatWindow:
    type: framework
    platform: macOS
    sources:
      - path: ChatWindow
        excludes:
          - "**/Tests/**"
    dependencies:
      - target: Core
      - target: CoreUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.ChatWindow

  # --- Feature: notes window ---
  NotesWindow:
    type: framework
    platform: macOS
    sources:
      - path: NotesWindow
        excludes:
          - "**/Tests/**"
    dependencies:
      - target: Core
      - target: CoreUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.NotesWindow

  # --- Feature: settings window ---
  SettingsWindow:
    type: framework
    platform: macOS
    sources:
      - path: SettingsWindow
        excludes:
          - "**/Tests/**"
    dependencies:
      - target: Core
      - target: CoreUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.SettingsWindow

  # --- Feature: terminal window (SwiftTerm-based) ---
  TerminalWindow:
    type: framework
    platform: macOS
    sources:
      - path: TerminalWindow
        excludes:
          - "**/Tests/**"
    dependencies:
      - target: Core
      - target: CoreUI
      - target: AIProvider
      - package: SwiftTerm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.TerminalWindow
        # SwiftTerm lacks library evolution support; disable it here so we
        # don't warn on every build about binary-compat not being guaranteed.
        BUILD_LIBRARY_FOR_DISTRIBUTION: NO

  TerminalWindowTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: TerminalWindow
        includes:
          - "**/Tests/**"
    dependencies:
      - target: TerminalWindow
      - target: AIProvider
      - target: CoreUI
      - target: Core

  # --- Feature: file browser (extracted from Catnip IDE) ---
  FileBrowser:
    type: framework
    platform: macOS
    sources:
      - path: FileBrowser
        excludes:
          - "**/Tests/**"
    dependencies:
      - target: Core
      - package: CodeEditSourceEditor
        product: CodeEditSourceEditor
      - package: CodeEditLanguages
        product: CodeEditLanguages
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.FileBrowser

  FileBrowserTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: FileBrowser
        includes:
          - "**/Tests/**"
    dependencies:
      - target: FileBrowser
      - target: Core

schemes:
  Core:
    build:
      targets:
        Core: all
    test:
      targets:
        - CoreTests

  Scripting:
    build:
      targets:
        Scripting: all
    test:
      targets:
        - ScriptingTests

  CoreUI:
    build:
      targets:
        CoreUI: all
    test:
      targets:
        - CoreUITests

  AIProvider:
    build:
      targets:
        AIProvider: all
    test:
      targets:
        - AIProviderTests

  LoggingWindow:
    build:
      targets:
        LoggingWindow: all
    test:
      targets:
        - LoggingWindowTests

  ChatWindow:
    build:
      targets:
        ChatWindow: all

  NotesWindow:
    build:
      targets:
        NotesWindow: all

  SettingsWindow:
    build:
      targets:
        SettingsWindow: all

  TerminalWindow:
    build:
      targets:
        TerminalWindow: all
    test:
      targets:
        - TerminalWindowTests

  FileBrowser:
    build:
      targets:
        FileBrowser: all
    test:
      targets:
        - FileBrowserTests
