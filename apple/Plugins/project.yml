name: Plugins
options:
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.3"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO

targetTemplates:
  Plugin:
    type: bundle
    platform: macOS
    dependencies:
      - package: AgenticToolkitCore
        product: AgenticToolkitCore
      - package: AgenticToolkitCoreUI
        product: AgenticToolkitCoreUI
      - package: AgenticToolkitSettingsWindow
        product: AgenticToolkitSettingsWindow
      - package: AgenticToolkitChatWindow
        product: AgenticToolkitChatWindow
      - package: AgenticToolkitPluginSDK
        product: AgenticToolkitPluginSDK

packages:
  AgenticToolkitCore:
    path: ../AgenticToolkit/AgenticToolkitCore
  AgenticToolkitCoreUI:
    path: ../AgenticToolkit/AgenticToolkitCoreUI
  AgenticToolkitSettingsWindow:
    path: ../AgenticToolkit/AgenticToolkitSettingsWindow
  AgenticToolkitChatWindow:
    path: ../AgenticToolkit/AgenticToolkitChatWindow
  AgenticToolkitPluginSDK:
    path: ../AgenticToolkit/AgenticToolkitPluginSDK

targets:

  ClaudeAPIPlugin:
    templates: [Plugin]
    sources:
      - path: ClaudeAPIPlugin
    settings:
      base:
        INFOPLIST_FILE: ClaudeAPIPlugin/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.plugin.claude-api

  ClaudeLocalPlugin:
    templates: [Plugin]
    sources:
      - path: ClaudeLocalPlugin
    settings:
      base:
        INFOPLIST_FILE: ClaudeLocalPlugin/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.plugin.claude-local

  OpenAIPlugin:
    templates: [Plugin]
    sources:
      - path: OpenAIPlugin
    settings:
      base:
        INFOPLIST_FILE: OpenAIPlugin/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.plugin.openai

  GooglePlugin:
    templates: [Plugin]
    sources:
      - path: GooglePlugin
    settings:
      base:
        INFOPLIST_FILE: GooglePlugin/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.plugin.google

  OpenAICompatiblePlugin:
    templates: [Plugin]
    sources:
      - path: OpenAICompatiblePlugin
    settings:
      base:
        INFOPLIST_FILE: OpenAICompatiblePlugin/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.agentictoolkit.plugin.openai-compatible

  # Note: `@testable import <PluginName>` against Bundle targets is known to
  # be unreliable. If this fails to compile, the plugins likely need
  # test-only framework twins or the tests need to load bundles at runtime
  # via PluginManager.
  PluginsTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: ClaudeAPIPlugin
      - target: ClaudeLocalPlugin
      - target: OpenAIPlugin
      - target: GooglePlugin
      - target: OpenAICompatiblePlugin
      - package: AgenticToolkitPluginSDK
        product: AgenticToolkitPluginSDK

schemes:
  Plugins:
    build:
      targets:
        ClaudeAPIPlugin: all
        ClaudeLocalPlugin: all
        OpenAIPlugin: all
        GooglePlugin: all
        OpenAICompatiblePlugin: all
    test:
      targets:
        - PluginsTests

# Client-facing aggregate target. Clients depend on `Plugins/AllPlugins` and
# never enumerate individual plugins. When a new plugin target is added to
# `targets:` above, also add it here — the only place that enumerates the
# full plugin list for client builds.
aggregateTargets:
  AllPlugins:
    targets:
      - ClaudeAPIPlugin
      - ClaudeLocalPlugin
      - OpenAIPlugin
      - GooglePlugin
      - OpenAICompatiblePlugin
